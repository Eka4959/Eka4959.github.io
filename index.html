<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Trail 3D Simulator - Version Finale</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* Style du Tableau de Bord (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 20px;
            border-radius: 12px;
            width: 280px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 1.4rem; color: #00ffaa; text-transform: uppercase; letter-spacing: 1px; }
        .massif-desc { font-size: 0.85rem; color: #aaa; margin-bottom: 15px; font-style: italic; }
        .stat { display: flex; justify-content: space-between; margin: 8px 0; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
        .stat-val { font-weight: bold; color: #fff; }
        
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            background: #333;
            color: #ddd;
            transition: background 0.2s;
        }
        button.active { background: #00ffaa; color: #111; }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <script>
        window.addEventListener('error', function(e) {
            document.getElementById('hud').innerHTML = `
                <h1 style="color:#ff4a4a;">⚠️ Erreur Script</h1>
                <p style="font-size:0.9rem;">Le moteur 3D n'a pas pu se lancer.</p>
                <p style="font-size:0.8rem; color:#aaa;">Raison : ${e.message}</p>
            `;
        });
    </script>

    <div id="hud">
        <h1 id="massif-name">Massif de la Chartreuse</h1>
        <div id="massif-desc" class="massif-desc">Forêts denses, ambiance mystique et calcaire humide.</div>
        
        <div class="stat"><span>Distance :</span><span id="stat-dist" class="stat-val">0.0 km</span></div>
        <div class="stat"><span>Altitude :</span><span id="stat-alt" class="stat-val">950 m</span></div>
        <div class="stat"><span>Dénivelé (D+) :</span><span id="stat-dplus" class="stat-val">0 m</span></div>
        <div class="stat"><span>Pente moyenne :</span><span id="stat-pente" class="stat-val">14 %</span></div>
        
        <div class="btn-container">
            <button id="btn-chartreuse" class="active" onclick="switchMassif('chartreuse')">🌲 Chartreuse</button>
            <button id="btn-belledonne" onclick="switchMassif('belledonne')">🪨 Belledonne</button>
        </div>
    </div>

    <div id="instructions">🖱️ Clic gauche + glisser pour tourner | Molette pour zoomer</div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let terrain, terrainGeometry, terrainMaterial;
        let pathLine, runner;
        let pathPoints = [];
        let runnerProgress = 0;
        let currentMassif = 'chartreuse';
        let totalDPlus = 0;
        let lastAltitude = 0;

        const config = {
            chartreuse: {
                color: 0x2e5c32, 
                fogColor: 0x1e2b21, 
                roughness: 0.5,
                amplitude: 14,
                desc: "Forêts denses, relief calcaire abrupt et humidité légendaire."
            },
            belledonne: {
                color: 0x5a6168, 
                fogColor: 0x141b24, 
                roughness: 0.8,
                amplitude: 24, 
                desc: "Haute montagne, chaos de blocs de granit et lacs glaciaires sauvages."
            }
        };

        window.onload = function() {
            init();
            animate();
        };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(config[currentMassif].fogColor, 0.012);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(scene.fog.color);
            document.body.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(50, 50, 70);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Éclairage
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
            sunLight.position.set(40, 80, 40);
            scene.add(sunLight);

            // Modélisation du terrain
            terrainGeometry = new THREE.PlaneGeometry(140, 140, 60, 60);
            terrainGeometry.rotateX(-Math.PI / 2); 
            
            terrainMaterial = new THREE.MeshStandardMaterial({
                color: config[currentMassif].color,
                roughness: config[currentMassif].roughness,
                metalness: 0.1,
                flatShading: true 
            });
            
            terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
            scene.add(terrain);

            updateTerrainVertices();

            // FIX CORRECTION : On crée d'abord l'objet du coureur 3D...
            const runnerGeo = new THREE.SphereGeometry(1, 16, 16);
            const runnerMat = new THREE.MeshBasicMaterial({ color: 0x00ffaa });
            runner = new THREE.Mesh(runnerGeo, runnerMat);
            
            const runnerLight = new THREE.PointLight(0x00ffaa, 3, 15);
            runner.add(runnerLight);
            scene.add(runner);

            // ...Et SEULEMENT APRÈS on génère le sentier qui se lie au runner
            createTrailPath();

            window.addEventListener('resize', onWindowResize);
        }

        function updateTerrainVertices() {
            const pos = terrainGeometry.attributes.position;
            const amp = config[currentMassif].amplitude;

            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i);
                let z = pos.getZ(i); 
                
                let y = Math.sin(x * 0.03) * Math.cos(z * 0.03) * amp;
                y += Math.sin(x * 0.07) * Math.sin(z * 0.07) * (amp * 0.3); 
                
                if (currentMassif === 'chartreuse' && y > 1) {
                    y += Math.tanh(y * 0.1) * 4; 
                }

                pos.setY(i, y);
            }
            terrainGeometry.computeVertexNormals();
            terrainGeometry.attributes.position.needsUpdate = true;
        }

        function createTrailPath() {
            if (pathLine) scene.remove(pathLine);

            pathPoints = [];
            const steps = 12;
            for (let i = 0; i <= steps; i++) {
                let t = i / steps;
                let x = -45 + t * 90 + Math.sin(t * Math.PI * 4) * 10;
                let z = -45 + t * 90 + Math.cos(t * Math.PI * 3) * 6;
                let y = getTerrainHeightAt(x, z) + 0.3; 
                pathPoints.push(new THREE.Vector3(x, y, z));
            }

            const curve = new THREE.CatmullRomCurve3(pathPoints);
            const points = curve.getPoints(200); 
            
            const pathGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const pathMaterial = new THREE.LineBasicMaterial({ color: 0xffaa00, linewidth: 4 }); 
            
            pathLine = new THREE.Line(pathGeometry, pathMaterial);
            scene.add(pathLine);
            
            // Sécurité additionnelle : on vérifie que le runner existe bien
            if(runner) {
                runner.curvePath = curve;
            }
        }

        function getTerrainHeightAt(x, z) {
            const amp = config[currentMassif].amplitude;
            let y = Math.sin(x * 0.03) * Math.cos(z * 0.03) * amp;
            y += Math.sin(x * 0.07) * Math.sin(z * 0.07) * (amp * 0.3);
            if (currentMassif === 'chartreuse' && y > 1) {
                y += Math.tanh(y * 0.1) * 4;
            }
            return y;
        }

        window.switchMassif = function(massif) {
            if (currentMassif === massif) return;
            currentMassif = massif;

            document.getElementById('btn-chartreuse').classList.toggle('active', massif === 'chartreuse');
            document.getElementById('btn-belledonne').classList.toggle('active', massif === 'belledonne');
            document.getElementById('massif-name').innerText = massif === 'chartreuse' ? "Massif de la Chartreuse" : "Massif de Belledonne";
            document.getElementById('massif-desc').innerText = config[massif].desc;

            totalDPlus = 0;
            runnerProgress = 0;

            scene.fog.color.setHex(config[massif].fogColor);
            renderer.setClearColor(scene.fog.color);
            terrainMaterial.color.setHex(config[massif].color);
            terrainMaterial.roughness = config[massif].roughness;
            
            updateTerrainVertices();
            createTrailPath();
        }

        function animate() {
            requestAnimationFrame(animate);

            runnerProgress += 0.0005; 
            if (runnerProgress > 1) {
                runnerProgress = 0;
                totalDPlus = 0;
            }

            if (runner && runner.curvePath) {
                const pos = runner.curvePath.getPointAt(runnerProgress);
                runner.position.copy(pos);

                let altitudeReelle = Math.round(950 + (pos.y * 35)); 
                let distanceReelle = (runnerProgress * 18.5).toFixed(1);

                if (lastAltitude > 0 && altitudeReelle > lastAltitude) {
                    totalDPlus += (altitudeReelle - lastAltitude);
                }
                lastAltitude = altitudeReelle;

                let pente = Math.round(12 + (pos.y * 0.7) + Math.sin(runnerProgress * 40) * 6);

                document.getElementById('stat-dist').innerText = `${distanceReelle} km`;
                document.getElementById('stat-alt').innerText = `${altitudeReelle} m`;
                document.getElementById('stat-dplus').innerText = `${totalDPlus} m D+`;
                document.getElementById('stat-pente').innerText = `${Math.max(2, pente)} %`;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
