<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prepa B/L · Revisions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===================================================================
   VARIABLES CSS & RESET
   =================================================================== */
   :root {
  /* ===================================================================
     MODE CLAIR (Par défaut la journée)
     =================================================================== */
  --bg: #F4F6F9;
  --bg2: #FFFFFF;
  --bg3: #E4E8EF;
  --border: rgba(15, 25, 35, 0.08);
  --text: #0F1923;
  --text2: #4A5D6E;
  --text3: #788DA1;
  --yellow: #F2C94C;
  --red: #E05C5C;
  --green: #4CAF7C;
  --blue: #5B8DB8;
  --purple: #9B72CF;
  --sidebar-w: 260px;
  --header-h: 56px;
}

/* ===================================================================
   MODE NUIT (S'active automatiquement si votre appareil est en mode sombre)
   =================================================================== */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0F1923;
    --bg2: #1A2535;
    --bg3: #2C3E52;
    --border: rgba(240,237,230,0.09);
    --text: #F0EDE6;
    --text2: #8DA5BC;
    --text3: #5B7A96;
  }
}

/* Version forcée pour le bouton de bascule si votre script utilise une classe */
body.dark-theme, root.dark-theme {
  --bg: #0F1923;
  --bg2: #1A2535;
  --bg3: #2C3E52;
  --border: rgba(240,237,230,0.09);
  --text: #F0EDE6;
  --text2: #8DA5BC;
  --text3: #5B7A96;
}
body.light-theme {
  --bg: #F4F6F9;
  --bg2: #FFFFFF;
  --bg3: #E4E8EF;
  --border: rgba(15, 25, 35, 0.08);
  --text: #0F1923;
  --text2: #4A5D6E;
  --text3: #788DA1;
}
.light {
  --bg: #F5F2EC;
  --bg2: #ECEAE3;
  --bg3: #DDD9CF;
  --border: rgba(15,25,35,0.1);
  --text: #1A2535;
  --text2: #5B7A96;
  --text3: #8DA5BC;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; transition: background 0.3s, color 0.3s; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }
#app { display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.25s ease, min-width 0.25s ease; z-index: 100; }
#sidebar.collapsed { width: 56px; min-width: 56px; }
.sidebar-logo { height: var(--header-h); display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 10px; }
.sidebar-logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; }
.sidebar-logo-text span { color: var(--yellow); }
#sidebar.collapsed .sidebar-logo-text { display: none; }
.sidebar-toggle { margin-left: auto; background: none; border: none; color: var(--text2); padding: 4px; border-radius: 4px; display: flex; align-items: center; transition: color 0.15s; flex-shrink: 0; }
.sidebar-toggle:hover { color: var(--text); }
.sidebar-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0; }
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.nav-section { margin-bottom: 4px; }
.nav-section-header { display: flex; align-items: center; gap: 8px; padding: 6px 12px; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); white-space: nowrap; overflow: hidden; }
#sidebar.collapsed .nav-section-header { padding: 6px; justify-content: center; }
#sidebar.collapsed .nav-section-header span:last-child { display: none; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: 6px; margin: 1px 6px; cursor: pointer; transition: background 0.12s, color 0.12s; white-space: nowrap; overflow: hidden; color: var(--text2); font-size: 0.85rem; border: none; background: none; width: calc(100% - 12px); text-align: left; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(242,201,76,0.12); color: var(--yellow); }
.nav-item .nav-icon { font-size: 0.95rem; flex-shrink: 0; width: 18px; text-align: center; }
.nav-item .nav-label { overflow: hidden; text-overflow: ellipsis; }
#sidebar.collapsed .nav-item { justify-content: center; padding: 8px; margin: 1px auto; width: 40px; }
#sidebar.collapsed .nav-label { display: none; }
#sidebar.collapsed .nav-badge { display: none; }
.nav-badge { margin-left: auto; background: var(--red); color: white; font-size: 0.62rem; font-weight: 700; padding: 1px 5px; border-radius: 8px; flex-shrink: 0; }
.nav-badge.yellow { background: var(--yellow); color: var(--bg); }
.nav-reset { color: var(--red) !important; }
.nav-reset:hover { background: rgba(224,92,92,0.15) !important; color: var(--red) !important; }
.subject-tree { border-left: 1px solid var(--border); margin-left: 18px; padding-left: 8px; }
.subject-chapter { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 5px; cursor: pointer; color: var(--text2); font-size: 0.8rem; transition: all 0.12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; background: none; width: 100%; text-align: left; }
.subject-chapter:hover { background: var(--bg3); color: var(--text); }
.subject-chapter.active { color: var(--yellow); }
#sidebar.collapsed .subject-tree { display: none; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { height: var(--header-h); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0; background: var(--bg); }
.topbar-breadcrumb { font-size: 0.8rem; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.topbar-breadcrumb span { color: var(--text); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

/* Pilule d'XP et streak */
.xp-pill { background: rgba(242,201,76,0.12); border: 1px solid rgba(242,201,76,0.3); color: var(--yellow); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; }
.streak-pill { background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.3); color: var(--red); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; }

.theme-toggle { background: none; border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: all 0.15s; }
.theme-toggle:hover { color: var(--text); border-color: var(--text2); }
#content { flex: 1; overflow-y: auto; padding: 28px; }
#content::-webkit-scrollbar { width: 5px; }
#content::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

/* BASE DE DONNÉES / TABLEAUX */
.db-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: var(--bg2); border-radius: 8px; overflow: hidden; margin-top: 8px; }
.db-table th, .db-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); text-align: left; }
.db-table th { background: var(--bg3); color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }
.db-table tr:last-child td { border-bottom: none; }
.db-action { background: none; border: none; cursor: pointer; color: var(--text2); padding: 4px; transition: all 0.15s; font-size: 1rem; }
.db-action:hover { color: var(--yellow); }
.db-action.del:hover { color: var(--red); }
.search-bar { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); margin-bottom: 16px; font-family: inherit; font-size: 0.9rem; }
.search-bar:focus { outline: none; border-color: var(--yellow); }

/* DASHBOARD */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
.subject-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden; }
.subject-card:hover { border-color: rgba(242,201,76,0.3); transform: translateY(-2px); }
.subject-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; opacity: 0; transition: opacity 0.18s; }
.subject-card:hover::before { opacity: 1; }
.sc-ses::before { background: #F2C94C; }
.sc-lettres::before { background: #9B72CF; }
.sc-philo::before { background: #E05C5C; }
.sc-histoire::before { background: #5B8DB8; }
.sc-geo::before { background: #4CAF7C; }
.sc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.sc-icon { font-size: 1.6rem; }
.sc-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
.sc-hours { font-size: 0.72rem; color: var(--text2); margin-top: 1px; }
.sc-stats { display: flex; gap: 12px; }
.sc-stat { text-align: center; }
.sc-stat-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
.sc-stat-label { font-size: 0.65rem; color: var(--text3); margin-top: 1px; }
.sc-progress { margin-top: 14px; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.sc-progress-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.due-badge { position: absolute; top: 12px; right: 12px; background: var(--red); color: white; font-size: 0.62rem; font-weight: 700; padding: 2px 6px; border-radius: 10px; }
.stats-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; flex: 1; min-width: 120px; }
.stat-card-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 2px; }
.stat-card-label { font-size: 0.72rem; color: var(--text2); }
.stat-xp { color: var(--yellow); }
.stat-ok { color: var(--green); }
.stat-err { color: var(--red); }
.stat-due { color: var(--blue); }

/* PLAY */
.play-config { max-width: 760px; }
.config-section { margin-bottom: 28px; }
.config-title { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; }
.chapter-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.chapter-pill { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; color: var(--text2); }
.chapter-pill:hover { border-color: var(--text2); color: var(--text); }
.chapter-pill.active { border-color: var(--yellow); color: var(--yellow); background: rgba(242,201,76,0.08); }
.pill-actions { display: flex; gap: 8px; }
.pill-action { font-size: 0.75rem; color: var(--text2); background: none; border: none; cursor: pointer; padding: 2px 0; }
.pill-action:hover { color: var(--yellow); }
.mode-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.mode-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.15s; text-align: left; color: var(--text); display: flex; flex-direction: column; gap: 5px; }
.mode-card:hover { border-color: var(--text2); }
.mode-card.active { border-color: var(--red); background: rgba(224,92,92,0.07); }
.mode-card-icon { font-size: 1.2rem; }
.mode-card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; }
.mode-card-count { font-size: 0.7rem; color: var(--text2); }
.mode-card-count.due { color: var(--yellow); }
.start-big { background: var(--yellow); color: var(--bg); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; padding: 12px 32px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.18s; display: inline-flex; align-items: center; gap: 8px; }
.start-big:hover { background: #e8b820; transform: translateY(-1px); }
.start-big:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.all-done-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 32px; text-align: center; max-width: 480px; }
.all-done-icon { font-size: 2.5rem; margin-bottom: 12px; }
.all-done-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 8px; }
.all-done-sub { color: var(--text2); font-size: 0.88rem; line-height: 1.6; }

/* QUIZ */
#quiz-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; flex-direction: column; overflow: hidden; }
#quiz-overlay.show { display: flex; }
.quiz-topbar { height: var(--header-h); display: flex; align-items: center; padding: 0 24px; gap: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.quiz-close { background: none; border: none; color: var(--text2); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.12s; }
.quiz-close:hover { background: var(--bg3); color: var(--text); }
.quiz-prog-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.quiz-prog-bar { height: 100%; background: var(--yellow); border-radius: 2px; transition: width 0.4s; }
.quiz-counter { font-size: 0.78rem; color: var(--text2); white-space: nowrap; }
.quiz-xp-live { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; color: var(--yellow); }
.quiz-body { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 32px 24px; }
.quiz-inner { width: 100%; max-width: 640px; }
.streak-dots { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
.streak-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--bg3); flex-shrink: 0; transition: background 0.25s; }
.streak-dot.ok { background: var(--green); }
.streak-dot.ko { background: var(--red); }
.q-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.q-badge { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--yellow); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.q-chapter-tag { background: var(--bg3); color: var(--text2); font-size: 0.62rem; padding: 2px 7px; border-radius: 4px; text-transform: none; letter-spacing: 0; }
.q-text { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 1.1rem; line-height: 1.55; }
.opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.opt { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 9px; cursor: pointer; transition: all 0.12s; color: var(--text); font-size: 0.9rem; line-height: 1.4; text-align: left; }
.opt:hover:not(:disabled) { border-color: var(--text2); background: var(--bg3); }
.opt.correct { border-color: var(--green); background: rgba(76,175,124,0.1); color: var(--green); }
.opt.wrong { border-color: var(--red); background: rgba(224,92,92,0.08); color: var(--red); }
.opt:disabled { cursor: default; }
.opt-letter { min-width: 26px; height: 26px; border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.72rem; flex-shrink: 0; }
.opt.correct .opt-letter { border-color: var(--green); }
.opt.wrong .opt-letter { border-color: var(--red); }
.vf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.vf-btn { padding: 14px; border: 1.5px solid var(--border); border-radius: 9px; background: var(--bg2); color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.12s; }
.vf-btn:hover:not(:disabled) { background: var(--bg3); }
.vf-btn.correct { border-color: var(--green); background: rgba(76,175,124,0.1); color: var(--green); }
.vf-btn.wrong { border-color: var(--red); background: rgba(224,92,92,0.08); color: var(--red); }
.feedback { display: none; background: var(--bg3); border-radius: 9px; padding: 14px 16px; margin-bottom: 14px; border-left: 3px solid var(--green); font-size: 0.86rem; line-height: 1.6; }
.feedback.ko { border-left-color: var(--red); }
.feedback strong { display: block; font-family: 'Syne', sans-serif; font-size: 0.88rem; margin-bottom: 3px; }
.next-btn { background: var(--text); color: var(--bg); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer; display: none; transition: all 0.15s; }
.next-btn:hover { background: var(--yellow); color: var(--bg); }

/* BILAN */
.bilan-tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.bilan-tab { padding: 8px 18px; font-size: 0.82rem; font-weight: 500; color: var(--text2); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; margin-bottom: -1px; }
.bilan-tab:hover { color: var(--text); }
.bilan-tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }
.chapter-bilan-list { display: flex; flex-direction: column; gap: 10px; max-width: 720px; }
.chapter-bilan-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
.cbi-rank { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; width: 28px; flex-shrink: 0; text-align: center; color: var(--text3); }
.cbi-info { flex: 1; min-width: 0; }
.cbi-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cbi-subject { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
.cbi-bar-wrap { flex: 1; max-width: 200px; }
.cbi-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.cbi-bar-fill { height: 100%; border-radius: 2px; }
.cbi-bar-label { font-size: 0.68rem; color: var(--text2); }
.cbi-stats { display: flex; gap: 14px; flex-shrink: 0; text-align: right; }
.cbi-stat-n { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; }
.cbi-stat-l { font-size: 0.65rem; color: var(--text3); }
.btn-review { background: var(--yellow); color: var(--bg); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem; padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
.btn-review:hover { background: #e8b820; transform: translateY(-1px); }
.errors-list { display: flex; flex-direction: column; gap: 8px; max-width: 720px; }
.error-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
.error-item .err-count { background: rgba(224,92,92,0.15); color: var(--red); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; margin-top: 1px; }
.err-body { flex: 1; min-width: 0; }
.err-q { font-size: 0.88rem; line-height: 1.4; margin-bottom: 3px; }
.err-meta { font-size: 0.7rem; color: var(--text2); }
.err-mode { background: var(--bg3); padding: 1px 6px; border-radius: 4px; margin-right: 4px; }

/* COURS */
.cours-layout { display: flex; gap: 24px; height: 100%; }
.cours-list { width: 240px; flex-shrink: 0; }
.cours-list-title { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }
.cours-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; cursor: pointer; color: var(--text2); font-size: 0.82rem; transition: all 0.12s; border: none; background: none; width: 100%; text-align: left; margin-bottom: 2px; }
.cours-item:hover { background: var(--bg3); color: var(--text); }
.cours-item.active { background: rgba(242,201,76,0.1); color: var(--yellow); }
.cours-divider { height: 1px; background: var(--border); margin: 8px 0; }
.cours-new-btn { display: flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 7px; background: none; border: 1px dashed var(--border); color: var(--text2); font-size: 0.8rem; cursor: pointer; width: 100%; transition: all 0.12s; }
.cours-new-btn:hover { border-color: var(--yellow); color: var(--yellow); }
.cours-viewer { flex: 1; overflow: hidden; }
.cours-viewer-inner { height: 100%; overflow-y: auto; padding-right: 8px; }
.cours-viewer-inner::-webkit-scrollbar { width: 4px; }
.cours-viewer-inner::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* EDITEUR DE COURS */
.cours-editor { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.cours-editor-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: none; border: none; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 8px; width: 100%; outline: none; }

<script>

   
// VARIABLES
let playConfig = { chapters: [], modes: ['qcm','vf','quote'] };
let quiz = { questions: [], index: 0, xpGained: 0, answered: false, currentGrade: null };
let bilanTab = 'chapitres';
let dbTab = 'questions';
let dbSearch = '';
let coursFocusId = null;
let addMode = 'qcm';

// DONNEES
const SEED_QUESTIONS = [{"id":"ses_inegalites_qcm_0","subject":"ses","chapter":"inegalites","mode":"qcm","q":"Quel concept correspond a : indicateur synthetique qui mesure l'intensite des inegalites de revenus ou de patrimoine ?","expl":"Le concept vise est coefficient de Gini : indicateur synthetique qui mesure l'intensite des inegalites de revenus ou de patrimoine.","opts":["reproduction sociale","redistribution","impot progressif","coefficient de Gini"],"correct":3}];
const SUBJECTS = [{id:'ses',name:'Sciences Eco. & So.',icon:'📊',color:'#F2C94C',hours:'6h/sem',colorClass:'sc-ses'},{id:'lettres',name:'Lettres',icon:'📖',color:'#9B72CF',hours:'4h/sem',colorClass:'sc-lettres'},{id:'philo',name:'Philosophie',icon:'🧠',color:'#E05C5C',hours:'4h/sem',colorClass:'sc-philo'},{id:'histoire',name:'Histoire',icon:'🏛️',color:'#5B8DB8',hours:'4h/sem',colorClass:'sc-histoire'},{id:'geo',name:'Géographie',icon:'🌍',color:'#4CAF7C',hours:'3h/sem',colorClass:'sc-geo'}];
const SES_CHAPTERS = [{id:'inegalites',name:'Inégalités & stratification'},{id:'marche',name:'Marché & prix'},{id:'travail',name:'Travail & emploi'},{id:'mondialisation',name:'Mondialisation'},{id:'solidarites',name:'Solidarités & protection'},{id:'lien_social',name:'Lien social & déviance'},{id:'europe',name:'Construction européenne'},{id:'croissance',name:'Croissance & innovation'}];
const MODE_LABELS = {qcm:'🎯 QCM',vf:'⚖️ Vrai / Faux',quote:'💬 Qui a dit ça ?'};

// STORAGE
function ls(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ETAT
// --- ÉTAT GLOBAL DE L'APPLICATION ---
let state = {
  // --- DONNÉES PERSONNELLES (Restent en local) ---
  xp: ls('bl_xp', 0),
  sr_data: ls('bl_sr_data', {}),
  streak: ls('bl_streak', 0),
  lastActivityDate: ls('bl_last_activity', null),
  theme: ls('bl_theme', 'auto'),
  sidebarCollapsed: ls('bl_sidebar', false),
  currentView: 'dashboard',
  currentSubject: null,
  currentChapter: null,
  editingCours: null,
  editingQuestion: null,
  
  // --- DONNÉES GLOBALES (Vides au départ, seront remplies par GitHub) ---
  questions: [],
  cours: [],
  chapters: {}
};
if (!state.questions) { state.questions = SEED_QUESTIONS; lsSet('bl_questions', state.questions); }


// --- CONFIGURATION GITHUB AUTOMATIQUE ---
const GITHUB_CONFIG = {
  owner: "Eka4959",       
  repo: "Eka4959.github.io",       
  branch: "main" 
};

// ==========================================
// 1. GESTION DU TOKEN ET DE GITHUB
// ==========================================

function getGitHubToken() {
  let token = localStorage.getItem('gh_admin_token');
  
  // Si l'utilisateur a déjà annulé dans le passé, on ne le dérange plus
  if (token === 'NO_TOKEN') {
    return null; 
  }
  
  if (!token) {
    token = prompt("🔒 Configuration de la sauvegarde :\n\nPour synchroniser tes données sur GitHub, entre ton Token.\n\n👉 Si tu cliques sur 'Annuler', tes données resteront sauvegardées LOCALEMENT sur ce navigateur et on ne t'embêtera plus.");
    
    if (token && token.trim() !== '') {
      localStorage.setItem('gh_admin_token', token.trim());
    } else {
      // On sauvegarde l'information que l'utilisateur ne veut pas utiliser GitHub
      localStorage.setItem('gh_admin_token', 'NO_TOKEN');
      showToast("Mode hors-ligne : sauvegarde locale uniquement.", "info");
      return null;
    }
  }
  return token;
}

async function pushToGitHub(path, data, commitMessage) {
  const token = getGitHubToken();
  if (!token) {
    // Si pas de token (ou si refusé), on arrête silencieusement.
    // Les données sont déjà sauvegardées en local via lsSet.
    return;
  }

  const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`;
  const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));

  try {
    const fileRes = await fetch(url, { headers: { "Authorization": `token ${token}` } });
    let sha = null;
    if (fileRes.ok) {
      const fileData = await fileRes.json();
      sha = fileData.sha;
    }

    const body = { message: commitMessage, content: contentBase64, branch: GITHUB_CONFIG.branch };
    if (sha) body.sha = sha;

    const pushRes = await fetch(url, {
      method: "PUT",
      headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    if (!pushRes.ok) throw new Error("Erreur lors du push");
  } catch (error) {
    console.error("Erreur GitHub Sync:", error);
    // On cache l'erreur pour ne pas spammer l'utilisateur si internet coupe
  }
}

// ==========================================
// 2. AUTHENTIFICATION ET COMPTES
// ==========================================

// On initialise la base utilisateur IMMÉDIATEMENT depuis le cache local pour éviter le plantage au rechargement
let usersDb = ls('bl_usersDb', {});

// Permet d'appuyer sur "Entrée" pour valider le pseudo
document.getElementById('auth-username')?.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') login();
});

function showAuth() {
  document.getElementById('auth-overlay').classList.add('show');
}

function hideAuth() {
  document.getElementById('auth-overlay').classList.remove('show');
  const badge = document.getElementById('user-badge');
  if (badge) badge.innerHTML = `👤 ${escapeHtml(state.currentUser)}`;
}

function loginUser(username) {
  // Charge l'état
  state.currentUser = username;
  state.xp = usersDb[username].xp || 0;
  state.streak = usersDb[username].streak || 0;
  state.lastActivityDate = usersDb[username].lastActivityDate || null;
  state.sr_data = usersDb[username].sr_data || {};
  
  lsSet('bl_current_user', username);
  updateBadges();
  hideAuth();
}

async function refreshUsersDb() {
  try {
    const res = await fetch(`./data/users.json?t=${Date.now()}`).catch(() => null);
    if (res && res.ok) {
      const fetchedUsers = await res.json();
      usersDb = { ...usersDb, ...fetchedUsers };
      lsSet('bl_usersDb', usersDb);
    }
  } catch (error) {
    console.warn('Impossible de recharger users.json', error);
  }
}

async function login() {
  const input = document.getElementById('auth-username');
  if (!input) return;
  const username = input.value.trim().toLowerCase();
  
  if (!username) return showToast("Veuillez entrer un pseudo", "err");

  if (!usersDb[username]) {
    await refreshUsersDb();
  }

  if (usersDb[username]) {
    loginUser(username);
    showToast(`Bon retour, ${username} !`, "ok");
  } else {

// 3. CHARGEMENT INITIAL (SÉCURISÉ)

async function initApp() {
  try {
    const noCache = new Date().getTime();
    
    // Promise.all pour charger tout en même temps.
    // Le .catch(() => null) empêche un fichier introuvable (404) de faire planter toute l'application.
    const [resQ, resC, resCh, resU] = await Promise.all([
      fetch(`./data/questions.json?t=${noCache}`).catch(() => null),
      fetch(`./data/cours.json?t=${noCache}`).catch(() => null),
      fetch(`./data/chapters.json?t=${noCache}`).catch(() => null),
      fetch(`./data/users.json?t=${noCache}`).catch(() => null)
    ]);
    
    if (resQ && resQ.ok) { state.questions = await resQ.json(); lsSet('bl_questions', state.questions); }
    if (resC && resC.ok) { state.cours = await resC.json(); lsSet('bl_cours', state.cours); }
    if (resCh && resCh.ok) { state.chapters = await resCh.json(); lsSet('bl_chapters', state.chapters); }
    
    // Gestion sans échec des utilisateurs
    if (resU && resU.ok) { 
        const fetchedUsers = await resU.json(); 
        usersDb = { ...usersDb, ...fetchedUsers }; // Fusion local + web
        lsSet('bl_usersDb', usersDb);
    }
    
  } catch (error) {
    console.warn("Démarrage en mode hors-ligne complet.", error);
  }
  
  // Filet de sécurité au cas où GitHub serait inaccessible au tout premier lancement
  if (!state.questions || state.questions.length === 0) {
    state.questions = SEED_QUESTIONS;
    state.chapters = {ses: SES_CHAPTERS, lettres: [], philo: [], histoire: [], geo: []};
  }
  
  buildSidebarSubjects();
  applyTheme();
  renderView();

  // Reconnexion automatique ou affichage de l'écran d'accueil
  const savedUser = ls('bl_current_user', null);
  if (savedUser && usersDb[savedUser]) {
    loginUser(savedUser); 
  } else {
    showAuth();
  }
}

function escapeHtml(text) { if (text === null || text === undefined) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

// STREAK - NOUVELLES FONCTIONS
function getTodayKey() { return new Date().toISOString().split('T')[0]; }
function updateStreak() { 
  const today = getTodayKey(); 
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1); const yesterdayKey = yesterday.toISOString().split('T')[0];
  
  if (state.lastActivityDate === today) { 
    // Déjà actif aujourd'hui, ne rien changer
    return; 
  } else if (state.lastActivityDate === yesterdayKey) { 
    // Continuation de la série
    state.streak++; 
  } else { 
    // Série rompue, réinitialiser
    state.streak = 1; 
  } 
  state.lastActivityDate = today; 
  lsSet('bl_streak', state.streak); 
  lsSet('bl_last_activity', state.lastActivityDate); 
}

// SPACED REPETITION
function getSR(qid) { return state.sr_data[qid] || { interval: 0, ef: 2.5, due: 0, errors: 0, attempts: 0 }; }
function updateSR(qid, grade) { 
  const sr = getSR(qid); 
  const now = Date.now(); 
  sr.attempts++;
  if (grade === 1) { 
    sr.errors++; 
    sr.interval = 0; 
    sr.due = now + 1 * 60 * 1000; 
  } else { 
    if (sr.interval === 0) sr.interval = 1; 
    else if (sr.interval === 1) sr.interval = 3; 
    else sr.interval = Math.round(sr.interval * sr.ef);
    if (grade === 2) sr.interval = Math.max(1, Math.round(sr.interval * 0.6));
    if (grade === 4) sr.interval = Math.round(sr.interval * 1.3);
    sr.ef = Math.max(1.3, sr.ef + 0.1 - (4 - grade) * (0.08 + (4 - grade) * 0.02));
    sr.due = now + sr.interval * 24 * 60 * 60 * 1000;
  }
  state.sr_data[qid] = sr; 
  lsSet('bl_sr_data', state.sr_data); 
}
function isDue(qid) { const sr = state.sr_data[qid]; if (!sr) return true; if (sr.due === 0) return true; return Date.now() >= sr.due - 5 * 60 * 1000; }
function getDueQuestions(subject, chapters, modes) { return state.questions.filter(q => { if (subject && q.subject !== subject) return false; if (chapters?.length && !chapters.includes(q.chapter)) return false; if (modes?.length && !modes.includes(q.mode)) return false; return isDue(q.id); }); }
function nextDueTime(subject, chapters, modes) { const upcoming = state.questions.filter(q => { if (subject && q.subject !== subject) return false; if (chapters?.length && !chapters.includes(q.chapter)) return false; if (modes?.length && !modes.includes(q.mode)) return false; const sr = state.sr_data[q.id]; return sr && sr.due > Date.now(); }); if (!upcoming.length) return null; upcoming.sort((a, b) => state.sr_data[a.id].due - state.sr_data[b.id].due); const times = upcoming.map(q => state.sr_data[q.id].due).sort((a, b) => a - b); return times[Math.min(4, times.length - 1)]; }
function fmtDuration(ms) { const m = Math.round(ms / 60000); if (m < 60) return m + ' min'; const h = Math.floor(m / 60), rm = m % 60; return h + 'h' + (rm ? rm.toString().padStart(2, '0') : ''); }
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function chapterName(subject, chapterId) { const chs = state.chapters[subject] || []; return chs.find(c => c.id === chapterId)?.name || 'Inconnu'; }

// FONCTIONS POUR LA REVISION CIBLEE
function getChapterErrorQuestions(chapterId, subjectId) { return state.questions.filter(q => { if (subjectId && q.subject !== subjectId) return false; if (q.chapter !== chapterId) return false; const sr = getSR(q.id); return sr && sr.errors > 0; }); }
function reviewChapter(chapterId, subjectId) { const questions = getChapterErrorQuestions(chapterId, subjectId); if (questions.length === 0) { showToast('Aucune erreur à réviser pour ce chapitre', 'err'); return; } playConfig = { chapters: [chapterId], modes: ['qcm', 'vf', 'quote'], subject: subjectId }; startQuiz(); nav('play'); }

function applyTheme() { const body = document.body; const btn = document.getElementById('theme-btn'); let dark; if (state.theme === 'dark') dark = true; else if (state.theme === 'light') dark = false; else { const h = new Date().getHours() + new Date().getMinutes() / 60; dark = h < sunriseH || h >= sunsetH; } body.classList.toggle('light', !dark); if (btn) btn.textContent = dark ? '🌙' : '☀️'; }

// FONCTION DE RENDU MARKDOWN AMÉLIORÉE
function renderMarkdown(text) {
  if (!text) return '';
  let result = text
    .replace(/:::\s*def\s*([\s\S]*?)\n:::/g, '<div class="block-def"><div class="block-label">Définition</div>$1</div>')
    .replace(/:::\s*cite\s*([\s\S]*?)\n:::/g, '<div class="block-cite">$1</div>')
    .replace(/:::\s*retenir\s*([\s\S]*?)\n:::/g, '<div class="block-retenir"><div class="block-label">À retenir</div>$1</div>')
    .replace(/\n--\s*([^\n]+)/g, '<div class="block-author">$1</div>')
    .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n\s*-\s+(.+)/g, '<li>$1</li>')
    .replace(/<li>[\s\S]*?<\/li>/g, (match) => `<ul>${match}</ul>`)
    .replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^---\s*$/gm, '<hr>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^([^<]+)$/gm, '<p>$1</p>')
    .replace(/<\/p><p>/g, '</p><p>')
    .replace(/<p><\/p>/g, '')
    .replace(/<p>(<ul>.*<\/ul>)<\/p>/g, '$1')
    .replace(/<p>(<blockquote>.*<\/blockquote>)<\/p>/g, '$1')
    .replace(/<p>(<h[1-3]>.*<\/h[1-3]>)<\/p>/g, '$1');
  if (!result.startsWith('<') && result.trim() !== '') { result = '<p>' + result + '</p>'; }
  return result;
}

// FONCTION D'INSERTION DE SNIPPET CORRIGÉE
function insertSnippet(event, template) {
  event.preventDefault();
  const textarea = document.getElementById('cours-content');
  if (!textarea) return;
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const selectedText = textarea.value.substring(start, end);
  const before = textarea.value.substring(0, start);
  const after = textarea.value.substring(end);
  const snippet = template.replace(/texte/g, selectedText || 'texte');
  textarea.value = before + snippet + after;
  const newCursorPos = start + snippet.length;
  textarea.selectionStart = newCursorPos;
  textarea.selectionEnd = newCursorPos;
  textarea.focus();
}

function confirmDeleteCours() { if (confirm('Voulez-vous vraiment supprimer ce cours ?')) { deleteCours(state.editingCours.id); } }
function saveCours() { 
  const title = document.getElementById('cours-title').value.trim(); 
  const content = document.getElementById('cours-content').value; 
  if (!title) { showToast('Le titre est obligatoire', 'err'); return; } 
  const newCours = { 
    id: state.editingCours?.id || 'cours_' + Date.now(), 
    title: title, 
    content: content, 
    createdAt: state.editingCours?.createdAt || Date.now(), 
    updatedAt: Date.now() 
  }; 
  if (state.editingCours) { 
    state.cours = state.cours.map(c => c.id === state.editingCours.id ? newCours : c); 
  } else { 
    state.cours.push(newCours); 
  } 
  lsSet('bl_cours', state.cours); 
// Envoi automatique à GitHub
  pushToGitHub("data/cours.json", state.cours, `Mise à jour du cours : ${newCours.title}`);
  state.editingCours = null; 
  nav('cours'); 
  showToast('Cours sauvegardé', 'ok'); 
}

function addQuestion() { 
  const subject = document.getElementById('aq-subject').value; 
  const chapter = document.getElementById('aq-chapter').value; 
  const mode = document.getElementById('aq-mode').value; 
  const question = document.getElementById('aq-question').value.trim(); 
  const explanation = document.getElementById('aq-explanation').value.trim(); 
  if (!subject || !chapter || !question) { showToast('Champs obligatoires manquants', 'err'); return; } 
  let newQuestion = { id: 'q_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4), subject: subject, chapter: chapter, mode: mode, q: question, expl: explanation };
  if (mode === 'qcm') { 
    const opts = []; 
    document.querySelectorAll('#qcm-opts .form-input').forEach(input => { opts.push(input.value.trim()); }); 
    if (opts.some(o => !o)) { showToast('Toutes les réponses doivent être remplies', 'err'); return; } 
    const checkedIndex = Array.from(document.querySelectorAll('input[name="correct-opt"]')).findIndex(r => r.checked); 
    newQuestion.opts = opts; 
    newQuestion.correct = checkedIndex; 
  } else if (mode === 'vf') { 
    newQuestion.correct = document.getElementById('vf-correct').value === 'true'; 
  } else if (mode === 'quote') { 
    const author = document.getElementById('quote-author').value.trim(); 
    if (!author) { showToast('Auteur obligatoire', 'err'); return; } 
    newQuestion.author = author; 
    newQuestion.correct = author; 
  } 
  state.questions.push(newQuestion); 
  lsSet('bl_questions', state.questions); 
  // Envoi automatique à GitHub
  pushToGitHub("data/questions.json", state.questions, "Ajout automatique d'une question via l'interface web");
  document.getElementById('aq-question').value = ''; 
  document.getElementById('aq-explanation').value = ''; 
  updateAddForm(); 
  showToast('Question ajoutée !', 'ok'); 
  nav('database');
}
function saveQuestion() { 
  const id = state.editingQuestion; 
  const subject = document.getElementById('aq-subject').value; 
  const chapter = document.getElementById('aq-chapter').value; 
  const mode = document.getElementById('aq-mode').value;

  const explanation = document.getElementById('aq-explanation').value.trim();

  if (mode === 'qcm') {

   /**
 * Fonction d'importation depuis un TSV (Copier-coller Excel)
 */
 function importTSV() {
  const raw = document.getElementById('import-tsv').value.trim();
  if (!raw) return showToast('Rien à importer', 'err');
  
  const lines = raw.split('\n');
  let count = 0;
  let newChaptersCount = 0;
  
  for (let line of lines) {
    const cols = line.split('\t').map(c => c.trim());
    if (cols.length < 5) continue; // Ignore les lignes mal formatées ou incomplètes
    
    const [subjRaw, chapName, modeRaw, qText, correctAns, bad1, bad2, bad3, expl] = cols;
    const subject = subjRaw.toLowerCase();
    const mode = modeRaw.toLowerCase();
    
    // Validation de la matière
    if (!SUBJECTS.find(s => s.id === subject)) continue;
    if (!['qcm', 'vf', 'quote'].includes(mode)) continue;
    
    // Gestion du Chapitre (Création automatique si absent)
    if (!state.chapters[subject]) state.chapters[subject] = [];
    let chapId = subject + '_' + chapName.toLowerCase().replace(/[^a-z0-9]/g, '_');
    let existingChap = state.chapters[subject].find(c => c.id === chapId || c.name.toLowerCase() === chapName.toLowerCase());
    
    if (!existingChap) {
      existingChap = { id: chapId, name: chapName };
      state.chapters[subject].push(existingChap);
      newChaptersCount++;
    }
    chapId = existingChap.id;
    
    // Construction de la question
    const entry = {
      id: 'imp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      subject,
      chapter: chapId,
      mode,
      q: qText,
      expl: expl || ''
    };
    
    if (mode === 'vf') {
      // Pour Vrai/Faux, on cherche si le mot "vrai" est dans la réponse
      entry.correct = correctAns.toLowerCase().includes('vrai') || correctAns.toLowerCase() === 'v';
    } else {
      // Pour QCM ou Quote, on rassemble les réponses et on les mélange
      let options = [correctAns];
      if (bad1) options.push(bad1);
      if (bad2) options.push(bad2);
      if (bad3) options.push(bad3);
      
      const shuffled = shuffle(options);
      entry.opts = shuffled;
      entry.correct = shuffled.indexOf(correctAns); // On sauvegarde l'index de la bonne réponse
    }
    
    state.questions.push(entry);
    count++;
  }
  
  if (count > 0) {
    lsSet('bl_questions', state.questions);
    if (newChaptersCount > 0) {
        lsSet('bl_chapters', state.chapters);
        buildSidebarSubjects(); // Mettre à jour le menu latéral
    }
    showToast(`${count} questions importées ✓`, 'ok');
    document.getElementById('import-tsv').value = '';
    renderAddQuestion(document.getElementById('content')); // Rafraîchir la vue
  } else {
    showToast('Erreur de format ou matière inconnue', 'err');
  }
}

// ===================================================================
// TESTS UNITAIRES POUR LA FONCTIONNALITÉ STREAK
// ===================================================================

function runStreakTests() {
  // Sauvegarder l'état original
  const originalState = JSON.parse(JSON.stringify(state));
  const originalXpPill = document.getElementById('xp-pill').textContent;
  const originalStreakPill = document.getElementById('streak-pill').textContent;

  const results = [];
  let tempStreak, tempLastActivity;

  // Helper pour simuler un état de streak
  function setupTest(streakVal, lastActivityVal) {
    tempStreak = state.streak;
    tempLastActivity = state.lastActivityDate;
    state.streak = streakVal;
    state.lastActivityDate = lastActivityVal;
  }

  // Helper pour restaurer
  function restoreTest() {
    state.streak = tempStreak;
    state.lastActivityDate = tempLastActivity;
  }

  // Test 1: getTodayKey retourne un format valide
  const todayKey = getTodayKey();
  results.push({
    name: "getTodayKey() retourne une date au format YYYY-MM-DD",
    passed: /^\d{4}-\d{2}-\d{2}$/.test(todayKey),
    details: `Retourne: ${todayKey}`
  });

  // Test 2: Premier jour (lastActivityDate = null)
  setupTest(0, null);
  updateStreak();
  results.push({
    name: "updateStreak: premier jour (null) -> streak = 1",
    passed: state.streak === 1 && state.lastActivityDate === getTodayKey(),
    details: `streak: ${state.streak}, lastActivity: ${state.lastActivityDate}`
  });
  restoreTest();

  // Test 3: Déjà actif aujourd'hui
  setupTest(5, getTodayKey());
  updateStreak();
  results.push({
    name: "updateStreak: déjà actif aujourd'hui -> streak inchangé",
    passed: state.streak === 5 && state.lastActivityDate === getTodayKey(),
    details: `streak: ${state.streak} (devrait rester 5)`
  });
  restoreTest();

  // Test 4: Continuation de streak (activité hier)
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayKey = yesterday.toISOString().split('T')[0];
  setupTest(5, yesterdayKey);
  updateStreak();
  results.push({
    name: "updateStreak: activité hier -> streak incrémenté à 6",
    passed: state.streak === 6 && state.lastActivityDate === getTodayKey(),
    details: `streak: ${state.streak}, lastActivity: ${state.lastActivityDate}`
  });
  restoreTest();

  // Test 5: Streak rompu (activité avant-hier)
  const twoDaysAgo = new Date();
  twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
  const twoDaysAgoKey = twoDaysAgo.toISOString().split('T')[0];
  setupTest(5, twoDaysAgoKey);
  updateStreak();
  results.push({
    name: "updateStreak: activité avant-hier -> streak réinitialisé à 1",
    passed: state.streak === 1 && state.lastActivityDate === getTodayKey(),
    details: `streak: ${state.streak} (devrait être 1)`
  });
  restoreTest();

  // Test 6: Streak rompu (activité il y a 3 jours)
  const threeDaysAgo = new Date();
  threeDaysAgo.setDate(threeDaysAgo.getDate() - 3);
  const threeDaysAgoKey = threeDaysAgo.toISOString().split('T')[0];
  setupTest(10, threeDaysAgoKey);
  updateStreak();
  results.push({
    name: "updateStreak: activité il y a 3 jours -> streak réinitialisé à 1",
    passed: state.streak === 1 && state.lastActivityDate === getTodayKey(),
    details: `streak: ${state.streak} (devrait être 1, pas 10)`
  });
  restoreTest();

  // Test 7: Mise à jour de updateBadges() avec streak
  setupTest(7, getTodayKey());
  updateBadges();
  results.push({
    name: "updateBadges: met à jour l'affichage du streak dans le DOM",
    passed: document.getElementById('streak-pill').textContent.includes('7'),
    details: `Affichage: ${document.getElementById('streak-pill').textContent}`
  });
  restoreTest();

  // Test 8: Streak à 0 (cas edge)
  setupTest(0, yesterdayKey);
  updateStreak();
  results.push({
    name: "updateStreak: streak à 0 avec activité hier -> devient 1",
    passed: state.streak === 1,
    details: `streak: ${state.streak}`
  });
  restoreTest();

  // Test 9: Appel multiple de updateStreak() le même jour
  setupTest(3, getTodayKey());
  updateStreak();
  const streakAfterFirst = state.streak;
  updateStreak();
  const streakAfterSecond = state.streak;
  updateStreak();
  results.push({
    name: "updateStreak: appel multiple le même jour -> streak reste inchangé",
    passed: streakAfterFirst === 3 && streakAfterSecond === 3 && state.streak === 3,
    details: `streak après 3 appels: ${state.streak} (devrait rester 3)`
  });
  restoreTest();

  // Test 10: Streak très élevé (pas de overflow)
  setupTest(999, yesterdayKey);
  updateStreak();
  results.push({
    name: "updateStreak: streak élevé (999) -> incrémente correctement à 1000",
    passed: state.streak === 1000,
    details: `streak: ${state.streak}`
  });
  restoreTest();

  // Test 11: Intégration - closeQuiz() appelle updateStreak() quand xpGained > 0
  setupTest(2, yesterdayKey);
  const originalCloseQuiz = window.closeQuiz;
  window.closeQuiz = function() {
    // Simuler closeQuiz avec xpGained > 0
    const tempXp = state.xp;
    state.xp += 10; // Simuler quiz.xpGained = 10
    if (10 > 0) {
      updateStreak();
    }
    updateBadges();
    // Vérifier que streak a été mis à jour
    const streakUpdated = state.streak === 3 && state.lastActivityDate === getTodayKey();
    state.xp = tempXp; // Restaurer XP
    return streakUpdated;
  };
  const integrationResult = closeQuiz();
  window.closeQuiz = originalCloseQuiz;
  results.push({
    name: "Intégration: closeQuiz() appelle updateStreak() quand XP gagné > 0",
    passed: integrationResult,
    details: `streak après closeQuiz: ${state.streak} (devrait être 3)`
  });
  restoreTest();

  // Test 12: closeQuiz() ne met pas à jour streak si xpGained = 0
  setupTest(2, yesterdayKey);
  const originalCloseQuiz2 = window.closeQuiz;
  window.closeQuiz = function() {
    // Simuler closeQuiz avec xpGained = 0
    if (0 > 0) {
      updateStreak();
    }
    updateBadges();
    return state.streak === 2; // Devrait rester 2
  };
  const integrationResult2 = closeQuiz();
  window.closeQuiz = originalCloseQuiz2;
  results.push({
    name: "Intégration: closeQuiz() ne met PAS à jour streak si XP gagné = 0",
    passed: integrationResult2,
    details: `streak reste à: ${state.streak} (devrait rester 2)`
  });
  restoreTest();

  // Restaurer l'état original
  Object.assign(state, originalState);
  document.getElementById('xp-pill').textContent = originalXpPill;
  document.getElementById('streak-pill').textContent = originalStreakPill;
  updateBadges();

  // Afficher les résultats
  console.log("=== RÉSULTATS DES TESTS STREAK ===");
  let passedCount = 0;
  results.forEach(test => {
    const status = test.passed ? "PASS" : "FAIL";
    console.log(`${test.passed ? '✅' : '❌'} [${status}] ${test.name}`);
    if (!test.passed) {
      console.log(`   Détails: ${test.details}`);
    }
    if (test.passed) passedCount++;
  });
  console.log(`================== ${passedCount}/${results.length} tests passés`);

  // Retourner un objet pour utilisation programmatique
  return {
    passed: passedCount,
    total: results.length,
    results: results
  };
}

// Fonction pour exécuter les tests et afficher dans l'UI
function displayTestResults() {
  const testResult = runStreakTests();

  overlay.style.top = '0';
  overlay.style.left = '0';
  overlay.style.right = '0';
  overlay.style.bottom = '0';
  overlay.style.background = 'rgba(0,0,0,0.7)';
  overlay.style.zIndex = '10000';
  overlay.style.display = 'flex';
  overlay.style.alignItems = 'center';
  overlay.style.justifyContent = 'center';
  overlay.style.flexDirection = 'column';
  overlay.style.gap = '20px';
  overlay.style.padding = '20px';
  overlay.id = 'test-overlay';

  const box = document.createElement('div');
  box.style.background = 'var(--bg2)';
  box.style.border = '1px solid var(--border)';
  box.style.borderRadius = '12px';
  box.style.padding = '24px';

  const title = document.createElement('h2');

  title.style.fontWeight = '700';
  title.style.marginBottom = '16px';
  title.style.color = 'var(--text)';

  const summary = document.createElement('div');
  summary.textContent = `${testResult.passed}/${testResult.total} tests passés`;
  summary.style.fontFamily = "'Syne', sans-serif";
  summary.style.fontWeight = '700';
  summary.style.fontSize = '1.2rem';
  summary.style.color = testResult.passed === testResult.total ? 'var(--green)' : 'var(--red)';

  const list = document.createElement('div');

    item.style.gap = '10px';
    item.style.padding = '8px 0';

    const detailsEl = document.createElement('div');

    detailsEl.style.fontSize = '0.8rem';
    detailsEl.style.color = 'var(--text2)';
    detailsEl.style.marginTop = '4px';
    
    text.appendChild(nameEl);

    list.appendChild(item);

  const closeBtn = document.createElement('button');

  closeBtn.style.marginTop = '16px';
  closeBtn.style.padding = '10px 20px';
  closeBtn.style.background = 'var(--bg3)';
  closeBtn.style.border = '1px solid var(--border)';
  closeBtn.style.borderRadius = '8px';
  closeBtn.style.color = 'var(--text)';
  closeBtn.style.cursor = 'pointer';
  closeBtn.style.fontFamily = 'inherit';
  closeBtn.onclick = () => overlay.remove();

  box.appendChild(title);
  box.appendChild(summary);
  box.appendChild(list);
  box.appendChild(closeBtn);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}
